<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RPP | Turmalina Negra</title>
    
    <!-- Configurações para virar APK (PWA) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icone.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #050505; --bg-card: #0c0c0e; --bg-inner: #000000;
            --text-main: #ffffff; --text-muted: #666666; --border: #1a1a1e;
            --shimmer-color: linear-gradient(to right, transparent, rgba(255,255,255,0.08), transparent);
            --nav-bg: rgba(12,12,14,0.95); --primary: #ffffff; --danger: #ff3344; --success: #00ff88;
            --radius-lg: 12px;
        }
        body.light-mode {
            --bg-app: #f4f4f7; --bg-card: #ffffff; --bg-inner: #f9f9fb;
            --text-main: #1a1a1e; --text-muted: #8e8e93; --border: #e5e5ea;
            --shimmer-color: linear-gradient(to right, transparent, rgba(0,0,0,0.04), transparent);
            --nav-bg: rgba(255,255,255,0.95); --primary: #000000; --danger: #d70015; --success: #248a3d;
        }
        
        /* ANIMAÇÃO PRIVACIDADE */
        .hidden-value { position: relative; color: transparent !important; transition: all 0.4s ease; filter: blur(12px); opacity: 0.3; }
        body.is-visible .hidden-value { color: inherit !important; filter: blur(0); opacity: 1; }
        
        .eye-slash { display: block; }
        body.is-visible .eye-slash { display: none; }

        .text-green { color: var(--success) !important; }
        .text-red { color: var(--danger) !important; }

        #lock-screen { position: fixed; inset: 0; background: var(--bg-app); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .confirm-card { background: var(--bg-card); border: 1px solid var(--border); padding: 25px; border-radius: 16px; width: 100%; max-width: 300px; text-align: center; }
        
        @keyframes shine { 0% { transform: translateX(-150%) skewX(-25deg); } 30% { transform: translateX(150%) skewX(-25deg); } 100% { transform: translateX(150%) skewX(-25deg); } }
        .shimmer { position: relative; overflow: hidden; }
        .shimmer::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--shimmer-color); animation: shine 10s infinite ease-in-out; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-main); padding-bottom: 120px; transition: 0.3s; overflow-x: hidden; }
        
        #toast-container { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 10000; width: 90%; max-width: 320px; pointer-events: none; }
        .toast { background: var(--bg-card); color: var(--text-main); padding: 14px 20px; border-radius: 8px; border: 1px solid var(--border); border-left: 4px solid var(--primary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; text-align: center; animation: toastIn 0.3s forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .app-header { background: var(--bg-app); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo-rpp { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; line-height: 1; color: var(--text-main); letter-spacing: -1px; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: var(--radius-lg); border: 1px solid var(--border); position: relative; overflow: hidden; }
        .stat-card span { font-size: 0.55rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .stat-card div { font-size: 1rem; font-weight: 800; }
        
        .category-wrapper { margin-bottom: 15px; border-radius: var(--radius-lg); border: 1px solid var(--border); background: var(--bg-card); overflow: hidden; }
        .category-cover { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .category-info h2 { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; }
        .category-status { font-size: 0.55rem; font-weight: 800; border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; color: var(--text-muted); text-transform: uppercase; }
        .category-content { background: var(--bg-inner); padding: 0; max-height: 0; overflow: hidden; transition: 0.4s ease-out; }
        .category-wrapper.active .category-content { max-height: 3000px; padding: 15px; border-top: 1px solid var(--border); }
        
        .main-card { background: var(--bg-card); border-radius: var(--radius-lg); padding: 15px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .btn { padding: 14px; border-radius: 10px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; font-size: 0.65rem; width: 100%; border: 1px solid var(--border); margin-bottom: 10px; background: var(--bg-card); color: var(--text-main); }
        
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 0.75rem; }
        
        .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; height: 65px; background: var(--nav-bg); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: var(--text-muted); font-size: 0.5rem; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 4px; text-transform: uppercase; cursor: pointer; flex: 1; transition: 0.2s; }
        .nav-item.active { color: var(--text-main); }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000; display:none; align-items: flex-end; }
        .modal-sheet { background: var(--bg-card); width: 100%; border-radius: 20px 20px 0 0; padding: 30px 20px; max-height: 85vh; border-top: 1px solid var(--border); overflow-y: auto; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-inner); color: var(--text-main); font-weight: 600; margin-bottom: 12px; outline: none; font-size: 0.85rem; }
        
        .content-section { display: none; padding-top: 10px; }
        .content-section.active { display: block; }
    </style>
</head>
<body>

<!-- TELA DE BLOQUEIO -->
<div id="lock-screen">
    <div style="font-family:'Orbitron'; font-size:3rem; margin-bottom:20px; opacity:0.3">RPP</div>
    <button class="btn" style="width:200px" onclick="unlockApp()">DESBLOQUEAR</button>
</div>

<!-- CONFIRMAÇÃO -->
<div id="confirm-overlay">
    <div class="confirm-card">
        <div id="confirm-text" style="font-weight:700; margin-bottom:20px; font-size: 0.9rem"></div>
        <div style="display:flex; gap:10px">
            <button class="btn" style="background:var(--bg-app); border:none" onclick="cancelCustomConfirm()">NÃO</button>
            <button class="btn" style="background:var(--success); color:#000; border:none" id="confirm-yes-btn">SIM</button>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<header class="app-header">
    <div class="logo-container"><div class="logo-rpp">RPP</div><div style="color:var(--text-muted); font-size:0.5rem; font-weight:700; text-transform:uppercase; letter-spacing:2px">tourmaline edition</div></div>
    <div style="display:flex; gap:6px; align-items: center;">
        <div style="background:transparent; border:1px solid var(--border); width:35px; height:35px; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="document.body.classList.toggle('is-visible')">
            <svg style="width:18px; fill:none; stroke:currentColor; stroke-width:2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
                <line class="eye-slash" x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2" />
            </svg>
        </div>
        <select id="month-selector" onchange="render()" style="width: 75px; padding: 6px; font-size: 0.65rem; margin:0; height:35px"></select>
    </div>
</header>

<div id="top-stats" class="dashboard-grid">
    <div class="stat-card shimmer"><span>Ganhos</span><div id="stat-inc" class="hidden-value">R$ 0,00</div></div>
    <div class="stat-card shimmer"><span>Efetivado</span><div id="stat-exp" class="hidden-value">R$ 0,00</div></div>
    <div class="stat-card shimmer"><span>Saldo Atual</span><div id="stat-bal" class="hidden-value">R$ 0,00</div></div>
</div>

<div class="container" style="padding: 0 20px;">
    <section id="resumo" class="content-section active">
        <div id="resumo-casa-container"></div>
        <div id="tabelas-por-pessoa" style="display:grid; grid-template-columns:1fr 1fr; gap:10px"></div>
    </section>
    
    <section id="lancar" class="content-section">
        <button class="btn shimmer" onclick="openModalLancar('modal-ganho')">Novo Ganho</button>
        <button class="btn shimmer" onclick="openModalLancar('modal-fixo')">Nova Conta Fixa</button>
        <button class="btn shimmer" onclick="openModalLancar('modal-variavel')">Lançar Gasto Casa</button>
        <div id="list-fixed" style="margin-top:20px"></div>
    </section>

    <section id="configuracao" class="content-section">
        <button class="btn shimmer" onclick="toggleTheme()">TROCAR TEMA</button>
        <button class="btn shimmer" onclick="toggleSecurity()">SEGURANÇA (BIOMETRIA/SENHA)</button>
        <button class="btn shimmer" onclick="exportarDados()">EXPORTAR BACKUP</button>
    </section>
</div>

<!-- MODAIS BÁSICOS -->
<div id="modal-ganho" class="modal-overlay" onclick="if(event.target==this) closeModals()">
    <div class="modal-sheet">
        <input type="text" id="r-desc" placeholder="Descrição">
        <input type="number" id="r-val" placeholder="0.00">
        <button class="btn shimmer" onclick="addRecebido()">SALVAR</button>
    </div>
</div>

<div id="modal-fixo" class="modal-overlay" onclick="if(event.target==this) closeModals()">
    <div class="modal-sheet">
        <input type="number" id="f-dia" placeholder="Dia">
        <input type="text" id="f-desc" placeholder="Nome da Conta">
        <input type="text" id="f-resp" placeholder="Responsável">
        <button class="btn shimmer" onclick="addFixedAccount()">CRIAR</button>
    </div>
</div>

<div id="modal-variavel" class="modal-overlay" onclick="if(event.target==this) closeModals()">
    <div class="modal-sheet">
        <input type="text" id="v-desc" placeholder="O que comprou?">
        <input type="number" id="v-val" placeholder="0.00">
        <button class="btn shimmer" onclick="addVariavel()">LANÇAR</button>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="openTab('resumo')">INÍCIO</div>
    <div class="nav-item" onclick="openTab('lancar')">LANÇAR</div>
    <div class="nav-item" onclick="openTab('configuracao')">AJUSTES</div>
</nav>

<script>
    // --- LÓGICA DE SERVICE WORKER (OFFLINE) ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("Offline Ativo"));
    }

    const STORAGE_KEY = 'FIN_TURMALINA_V1';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        fixed_accounts: [],
        meses_dados: {},
        securityEnabled: false,
        theme: 'dark'
    };

    const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
    const mSel = document.getElementById('month-selector');
    meses.forEach((m, i) => { mSel.innerHTML += `<option value="${i}" ${i === new Date().getMonth() ? 'selected' : ''}>${m.toUpperCase()}</option>`; });

    // --- SEGURANÇA ATUALIZADA (COM SENHA RESERVA) ---
    async function unlockApp() {
        if (!db.securityEnabled) {
            document.getElementById('lock-screen').style.display = 'none';
            return;
        }

        try {
            if (window.PublicKeyCredential) {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                await navigator.credentials.get({ publicKey: { challenge, userVerification: "required" } });
                document.getElementById('lock-screen').style.display = 'none';
            } else {
                throw new Error("Sem biometria");
            }
        } catch (e) {
            // FALLBACK PARA SENHA CASO A BIOMETRIA DÊ ERRO
            let pass = prompt("Biometria falhou. Digite a senha reserva (Padrão 1234):");
            if (pass === "1234") {
                document.getElementById('lock-screen').style.display = 'none';
            } else {
                alert("Senha incorreta.");
            }
        }
    }

    function toggleSecurity() {
        customConfirm(db.securityEnabled ? "Desativar segurança?" : "Ativar segurança (Senha reserva: 1234)?", () => {
            db.securityEnabled = !db.securityEnabled;
            save();
            showToast("Segurança alterada");
        });
    }

    // --- FUNÇÕES DE DADOS ---
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); render(); }

    function addFixedAccount() {
        const d = document.getElementById('f-dia').value, n = document.getElementById('f-desc').value, r = document.getElementById('f-resp').value || 'Casa';
        if(!n) return;
        db.fixed_accounts.push({id: Date.now(), d, n, r});
        save(); closeModals();
    }

    function addRecebido() {
        const de = document.getElementById('r-desc').value, va = parseFloat(document.getElementById('r-val').value), k = mSel.value;
        if(!db.meses_dados[k]) db.meses_dados[k] = {recebidos: [], variaveis: [], paid: {}};
        db.meses_dados[k].recebidos.push({id: Date.now(), desc: de, val: va});
        save(); closeModals();
    }

    function addVariavel() {
        const de = document.getElementById('v-desc').value, va = parseFloat(document.getElementById('v-val').value), k = mSel.value;
        if(!db.meses_dados[k]) db.meses_dados[k] = {recebidos: [], variaveis: [], paid: {}};
        db.meses_dados[k].variaveis.push({id: Date.now(), desc: de, val: va});
        save(); closeModals();
    }

    function render() {
        const curM = mSel.value, data = db.meses_dados[curM] || {recebidos:[], variaveis:[], paid:{}};
        let totalInc = 0, totalExp = 0;

        (data.recebidos || []).forEach(r => totalInc += r.val);
        (data.variaveis || []).forEach(v => totalExp += v.val);

        document.getElementById('stat-inc').innerText = `R$ ${totalInc.toFixed(2)}`;
        document.getElementById('stat-exp').innerText = `R$ ${totalExp.toFixed(2)}`;
        document.getElementById('stat-bal').innerText = `R$ ${(totalInc - totalExp).toFixed(2)}`;

        // Render lista de fixas no lançar
        const lF = document.getElementById('list-fixed');
        lF.innerHTML = '<h3 style="font-size:0.7rem; margin-bottom:10px">CONTAS FIXAS CADASTRADAS</h3>';
        db.fixed_accounts.forEach(acc => {
            lF.innerHTML += `<div class="history-item"><span>${acc.d} - ${acc.n}</span><span>(${acc.r})</span></div>`;
        });
    }

    // --- UI HELPER ---
    function openTab(t) {
        document.querySelectorAll('.content-section').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(t).classList.add('active');
    }
    function openModalLancar(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); }
    function showToast(m) { const t = document.createElement('div'); t.className='toast'; t.innerText=m; document.getElementById('toast-container').appendChild(t); setTimeout(()=>t.remove(), 2000); }
    function customConfirm(m, cb) { document.getElementById('confirm-text').innerText=m; document.getElementById('confirm-overlay').style.display='flex'; document.getElementById('confirm-yes-btn').onclick=()=>{cb(); document.getElementById('confirm-overlay').style.display='none';}; }
    function cancelCustomConfirm() { document.getElementById('confirm-overlay').style.display='none'; }
    function toggleTheme() { db.theme = db.theme === 'dark' ? 'light' : 'dark'; applyTheme(); save(); }
    function applyTheme() { document.body.className = db.theme === 'light' ? 'light-mode' : ''; }

    window.onload = () => { applyTheme(); render(); if(db.securityEnabled) { document.getElementById('lock-screen').style.display='flex'; unlockApp(); } };
</script>
</body>
</html>
