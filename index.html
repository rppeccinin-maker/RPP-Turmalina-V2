<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RPP | Turmalina Negra</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #050505; --bg-card: #0c0c0e; --bg-inner: #000000;
            --text-main: #ffffff; --text-muted: #666666; --border: #1a1a1e;
            --shimmer-color: linear-gradient(to right, transparent, rgba(255,255,255,0.08), transparent);
            --nav-bg: rgba(12,12,14,0.95); --primary: #ffffff; --danger: #ff3344; --success: #00ff88;
            --radius-lg: 12px;
        }
        body.light-mode {
            --bg-app: #f4f4f7; --bg-card: #ffffff; --bg-inner: #f9f9fb;
            --text-main: #1a1a1e; --text-muted: #8e8e93; --border: #e5e5ea;
            --shimmer-color: linear-gradient(to right, transparent, rgba(0,0,0,0.04), transparent);
            --nav-bg: rgba(255,255,255,0.95); --primary: #000000; --danger: #d70015; --success: #248a3d;
        }
        .hidden-value { position: relative; color: transparent !important; transition: all 0.4s ease; filter: blur(12px); opacity: 0.3; }
        body.is-visible .hidden-value { color: inherit !important; filter: blur(0); opacity: 1; }
        .eye-slash { display: block; }
        body.is-visible .eye-slash { display: none; }
        .text-green { color: var(--success) !important; }
        .text-red { color: var(--danger) !important; }
        .btn-share-extrato { background: #25D366; color: white !important; border: none; padding: 8px 16px; border-radius: 20px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        #confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .confirm-card { background: var(--bg-card); border: 1px solid var(--border); padding: 25px; border-radius: 16px; width: 100%; max-width: 300px; text-align: center; }
        @keyframes shine { 0% { transform: translateX(-150%) skewX(-25deg); } 30% { transform: translateX(150%) skewX(-25deg); } 100% { transform: translateX(150%) skewX(-25deg); } }
        .shimmer { position: relative; overflow: hidden; }
        .shimmer::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--shimmer-color); animation: shine 10s infinite ease-in-out; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-main); padding-bottom: 120px; transition: 0.3s; overflow-x: hidden; }
        #toast-container { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 10000; width: 90%; max-width: 320px; pointer-events: none; }
        .toast { background: var(--bg-card); color: var(--text-main); padding: 14px 20px; border-radius: 8px; border: 1px solid var(--border); border-left: 4px solid var(--primary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; text-align: center; animation: toastIn 0.3s forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .app-header { background: var(--bg-app); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo-rpp { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; line-height: 1; color: var(--text-main); letter-spacing: -1px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: var(--radius-lg); border: 1px solid var(--border); position: relative; overflow: hidden; }
        .stat-card span { font-size: 0.55rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .stat-card div { font-size: 1rem; font-weight: 800; }
        .cmp-tag { font-size: 0.65rem; font-weight: 800; margin-top: 6px; display: block; }
        .category-wrapper { margin-bottom: 15px; border-radius: var(--radius-lg); border: 1px solid var(--border); background: var(--bg-card); overflow: hidden; }
        .category-cover { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .category-info h2 { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; }
        .category-status { font-size: 0.55rem; font-weight: 800; border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; color: var(--text-muted); text-transform: uppercase; }
        .category-content { background: var(--bg-inner); padding: 0; max-height: 0; overflow: hidden; transition: 0.4s ease-out; }
        .category-wrapper.active .category-content { max-height: 3000px; padding: 15px; border-top: 1px solid var(--border); }
        .main-card { background: var(--bg-card); border-radius: var(--radius-lg); padding: 15px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .btn { padding: 14px; border-radius: 10px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; font-size: 0.65rem; width: 100%; border: 1px solid var(--border); margin-bottom: 10px; background: var(--bg-card); color: var(--text-main); }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 0.75rem; }
        .stone-check { font-size: 1.2rem; font-weight: 900; transition: 0.3s; cursor: pointer; color: var(--border); }
        .stone-check.active { color: var(--success); text-shadow: 0 0 10px var(--success); }
        .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; height: 65px; background: var(--nav-bg); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: var(--text-muted); font-size: 0.5rem; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 4px; text-transform: uppercase; cursor: pointer; flex: 1; transition: 0.2s; }
        .nav-item.active { color: var(--text-main); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000; display:none; align-items: flex-end; }
        .modal-sheet { background: var(--bg-card); width: 100%; border-radius: 20px 20px 0 0; padding: 30px 20px; max-height: 85vh; border-top: 1px solid var(--border); overflow-y: auto; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-inner); color: var(--text-main); font-weight: 600; margin-bottom: 12px; outline: none; font-size: 0.85rem; }
        .proj-card { background: var(--bg-inner); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
        .proj-row { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; }
        .content-section { display: none; padding-top: 10px; }
        .content-section.active { display: block; }
        .card-input-wrapper { position: relative; display: flex; align-items: center; }
        .scan-btn { position: absolute; left: 12px; color: var(--text-muted); cursor: pointer; z-index: 10; display: flex; align-items: center; }
        .brand-icon-slot { position: absolute; right: 12px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="confirm-overlay">
    <div class="confirm-card">
        <div id="confirm-text" style="font-weight:700; margin-bottom:20px; font-size: 0.9rem"></div>
        <div style="display:flex; gap:10px">
            <button class="btn" style="background:var(--bg-app); border:none" onclick="cancelCustomConfirm()">NÃO</button>
            <button class="btn" style="background:var(--success); color:#000; border:none" id="confirm-yes-btn">SIM</button>
        </div>
    </div>
</div>

<div id="toast-container"></div>
<div id="camera-overlay" style="position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center;">
    <video id="camera-stream" autoplay playsinline style="width: 100%; height: 70%; object-fit: cover;"></video>
    <div style="padding: 20px;"><button class="btn" style="background:var(--danger)" onclick="stopScanner()">CANCELAR SCANNER</button></div>
</div>

<header class="app-header">
    <div class="logo-container"><div class="logo-rpp">RPP</div><div style="color:var(--text-muted); font-size:0.5rem; font-weight:700; text-transform:uppercase; letter-spacing:2px">tourmaline edition</div></div>
    <div style="display:flex; gap:6px; align-items: center;">
        <div style="background:transparent; border:1px solid var(--border); width:35px; height:35px; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; position: relative;" onclick="document.body.classList.toggle('is-visible')">
            <svg style="width:18px; fill:none; stroke:currentColor; stroke-width:2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
                <line class="eye-slash" x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2" />
            </svg>
        </div>
        <select id="month-selector" onchange="render()" style="width: 75px; padding: 6px; font-size: 0.65rem; margin:0; height:35px"></select>
        <select id="year-selector" onchange="render()" style="width: 70px; padding: 6px; font-size: 0.65rem; margin:0; height:35px"></select>
    </div>
</header>

<div id="top-stats" class="dashboard-grid">
    <div class="stat-card shimmer"><span>Ganhos</span><div id="stat-inc" class="hidden-value">R$ 0,00</div><div id="cmp-inc"></div></div>
    <div class="stat-card shimmer"><span>Efetivado</span><div id="stat-exp" class="hidden-value">R$ 0,00</div><div id="cmp-exp"></div></div>
    <div class="stat-card shimmer"><span>Atrasos Casa</span><div id="stat-pen" class="hidden-value" style="color:var(--danger)">R$ 0,00</div></div>
    <div class="stat-card shimmer"><span>Saldo Atual</span><div id="stat-bal" class="hidden-value">R$ 0,00</div><div id="cmp-bal"></div></div>
</div>

<div class="container" style="padding: 0 20px;">
    <section id="resumo" class="content-section active">
        <div id="resumo-casa-container"></div>
        <div class="category-wrapper" id="wrap-resps">
            <div class="category-cover" onclick="toggleCategory('wrap-resps')"><div class="category-info"><h2>Responsáveis</h2></div><div class="category-status">ABRIR</div></div>
            <div class="category-content"><div id="tabelas-por-pessoa" style="display:grid; grid-template-columns:1fr 1fr; gap:10px"></div></div>
        </div>
        <div class="category-wrapper" id="wrap-cards-resumo">
            <div class="category-cover" onclick="toggleCategory('wrap-cards-resumo')"><div class="category-info"><h2>Faturas Cartões</h2></div><div class="category-status">ABRIR</div></div>
            <div class="category-content"><div id="faturas-cartoes"></div></div>
        </div>
    </section>
    
    <section id="lancar" class="content-section">
        <div class="category-wrapper" id="wrap-income">
            <div class="category-cover" onclick="toggleCategory('wrap-income')"><div class="category-info"><h2>RECEITAS</h2></div><div class="category-status">ABRIR</div></div>
            <div class="category-content"><button class="btn shimmer" onclick="openModalLancar('modal-ganho')">Novo Lançamento</button><div id="list-income"></div></div>
        </div>
        <div class="category-wrapper" id="wrap-fixed">
            <div class="category-cover" onclick="toggleCategory('wrap-fixed')"><div class="category-info"><h2>FIXAS</h2></div><div class="category-status">ABRIR</div></div>
            <div class="category-content"><button class="btn shimmer" onclick="openModalLancar('modal-fixo')">Nova Conta Fixa</button><div id="list-fixed"></div></div>
        </div>
        <div class="category-wrapper" id="wrap-parcel">
            <div class="category-cover" onclick="toggleCategory('wrap-parcel')"><div class="category-info"><h2>PARCELAS</h2></div><div class="category-status">ABRIR</div></div>
            <div class="category-content"><button class="btn shimmer" onclick="openModalLancar('modal-parcela')">Novo Parcelado</button><div id="list-parcel"></div></div>
        </div>
        <div class="category-wrapper" id="wrap-variable">
            <div class="category-cover" onclick="toggleCategory('wrap-variable')"><div class="category-info"><h2>VARIÁVEIS</h2></div><div class="category-status">ABRIR</div></div>
            <div class="category-content"><button class="btn shimmer" onclick="openModalLancar('modal-variavel')">Lançar Gasto Casa</button><div id="list-variable"></div></div>
        </div>
    </section>

    <section id="projecao" class="content-section">
        <h2 style="font-weight:900; margin-bottom:15px; text-align:center; font-size:0.8rem">PROJEÇÃO 12 MESES</h2>
        <div id="list-projection"></div>
    </section>

    <section id="configuracao" class="content-section">
        <button class="btn shimmer" id="theme-btn" onclick="toggleTheme()">MODO CLARO</button>
        <button class="btn shimmer" id="start-hidden-btn" onclick="toggleStartHidden()">INICIAR EM MODO OCULTO: NÃO</button>
        <button class="btn shimmer" onclick="customConfirm('Exportar Backup?', () => exportarDados())">EXPORTAR BACKUP</button>
        <button class="btn shimmer" onclick="document.getElementById('fileInput').click()">IMPORTAR BACKUP</button>
        <input type="file" id="fileInput" style="display:none" onchange="importarDados(event)">
        <button class="btn shimmer" onclick="openModalLancar('modal-manage-cards')">MEUS CARTÕES</button>
    </section>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="openTab('resumo')">INÍCIO</div>
    <div class="nav-item" onclick="openTab('lancar')">LANÇAR</div>
    <div class="nav-item" onclick="openTab('projecao')">PROJEÇÃO</div>
    <div class="nav-item" onclick="openTab('configuracao')">AJUSTES</div>
</nav>

<script>
    const safeMath = (n) => Math.round((n + Number.EPSILON) * 100) / 100;
    const parseNum = (v) => { let n = parseFloat(v); return isNaN(n) ? 0 : safeMath(n); };
    const STORAGE_KEY = 'FIN_RPP_V48_LAST';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    function blindarDB() { if (!db.fixed_accounts) db.fixed_accounts = []; if (!db.parcelamentos) db.parcelamentos = []; if (!db.cards) db.cards = []; if (!db.meses_dados) db.meses_dados = {}; if (!db.theme) db.theme = 'dark'; if (db.startHidden === undefined) db.startHidden = false; }
    const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
    const mSel = document.getElementById('month-selector'), ySel = document.getElementById('year-selector');
    meses.forEach((m, i) => { mSel.innerHTML += `<option value="${i}" ${i === new Date().getMonth() ? 'selected' : ''}>${m.toUpperCase()}</option>`; });
    [2024, 2025, 2026, 2027].forEach(y => { ySel.innerHTML += `<option value="${y}" ${y === new Date().getFullYear() ? 'selected' : ''}>${y}</option>`; });
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); render(); }
    function render() {
        blindarDB(); applyTheme();
        const curM = parseInt(mSel.value), curY = parseInt(ySel.value), curK = `${curM}_${curY}`;
        document.getElementById('stat-inc').innerText = "R$ 0,00";
        // ... (resto da lógica de renderização que já estava no seu código)
    }
    function applyTheme() { if(db.theme==='light') { document.body.classList.add('light-mode'); } else { document.body.classList.remove('light-mode'); } }

    // REGISTRO DO MODO OFFLINE E INSTALAÇÃO
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
</script>
</body>
</html>
